[env:nano33ble]
platform = nordicnrf52
board = nano33ble
framework = arduino
 
; Libraries needed:
; - Arduino_BMI270_BMM150 or Arduino_LSM9DS1 for the built-in IMU
;   (Nano 33 BLE Sense Rev1 uses LSM9DS1, Rev2 uses BMI270_BMM150 — check your board)
; - Adafruit_DRV2605 for the haptic/LRA driver boards
lib_deps =
    arduino-libraries/Arduino_LSM9DS1@^1.1.1
    adafruit/Adafruit DRV2605 Library@^1.2.2
    adafruit/Adafruit BusIO@^1.15.0
 
monitor_speed = 115200